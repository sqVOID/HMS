    <script>
        // Global variable to store user access level
        let userAccessLevel = 'user';

        function openAddFoodModal() {
            // Prevent auditors from adding food
            if (userAccessLevel === 'auditor') {
                alert('Auditors cannot add food items. This action is restricted to Staff, Admin, and Super Admin only.');
                return;
            }

            document.getElementById('addFoodModal').style.display = 'flex';
        }

        function closeAddFoodModal() {
            document.getElementById('addFoodModal').style.display = 'none';
            document.getElementById('addFoodForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('uploadIcon').style.display = 'block';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const addModal = document.getElementById('addFoodModal');
            const editModal = document.getElementById('editFoodModal');
            if (event.target == addModal) {
                closeAddFoodModal();
            }
            if (event.target == editModal) {
                closeEditFoodModal();
            }
        }

        // Image preview functionality (Add Food)
        document.getElementById('food_image').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('uploadIcon').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Image preview functionality (Edit Food)
        document.getElementById('edit_food_image').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('editImagePreview').src = e.target.result;
                    document.getElementById('editImagePreview').style.display = 'block';
                    document.getElementById('editUploadIcon').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Form submission
        document.getElementById('addFoodForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const response = await fetch('add_breakfast_item.php', {
                    method: 'POST',
                    body: formData
                });

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                let result;
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    console.error('Non-JSON response:', text);
                    throw new Error('Server returned non-JSON response. Please check the PHP file.');
                } else {
                    result = await response.json();
                }

                if (result.success) {
                    alert(result.message);
                    closeAddFoodModal();
                    await loadBreakfast(); // Reload the breakfast list
                    filterBreakfast(); // Apply current filters
                } else {
                    alert(result.message || 'Error adding food!');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Store all breakfast items globally for filtering
        let allBreakfastItems = [];

        // Load breakfast items from database
        async function loadBreakfast() {
            try {
                const response = await fetch('get_breakfast.php');

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                let result;
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    console.error('Non-JSON response:', text);
                    throw new Error('Server returned non-JSON response. Please check the PHP file.');
                } else {
                    result = await response.json();
                }

                if (result.success) {
                    allBreakfastItems = result.items || [];
                    filterBreakfast();
                } else {
                    const grid = document.getElementById('breakfastGrid');
                    grid.innerHTML = '<div style="text-align:center; padding:20px; color:red;">' + (result.message || 'Error loading breakfast items.') + '</div>';
                }
            } catch (error) {
                console.error('Error loading breakfast:', error);
                const grid = document.getElementById('breakfastGrid');
                grid.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Error loading breakfast items: ' + error.message + '. Please refresh the page.</div>';
            }
        }

        // Filter breakfast based on search
        function filterBreakfast() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const grid = document.getElementById('breakfastGrid');
            grid.innerHTML = '';

            let filteredItems = allBreakfastItems;

            // Filter by search query (food name or description)
            if (searchQuery) {
                filteredItems = filteredItems.filter(item => {
                    const foodName = String(item.food_name || '').toLowerCase();
                    const description = String(item.description || '').toLowerCase();
                    return foodName.includes(searchQuery) || description.includes(searchQuery);
                });
            }

            // Display filtered items
            if (filteredItems.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">No breakfast items found matching your criteria.</div>';
            } else {
                filteredItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'breakfast-card';

                    // Escape single quotes and backslashes for JavaScript string
                    const escapeForJS = (str) => {
                        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                    };

                    const imageUrl = item.food_image || '';
                    const price = parseFloat(item.price || 0).toFixed(2);

                    // Check if user is auditor to disable edit button
                    const isAuditor = userAccessLevel === 'auditor';
                    const editIconHtml = isAuditor ? `
                        <img src="Icon/editbreakfastlogo.svg" alt="Edit" class="edit-icon" 
                            style="cursor: not-allowed; opacity: 0.5; pointer-events: none;" 
                            title="Auditors cannot edit food items">
                    ` : `
                        <img src="Icon/editbreakfastlogo.svg" alt="Edit" class="edit-icon" 
                            onclick="openEditFoodModal(${item.id}, '${escapeForJS(item.food_name)}', '${escapeForJS(item.description)}', ${item.price}, '${escapeForJS(imageUrl)}')" 
                            style="cursor: pointer;">
                    `;

                    card.innerHTML = `
                        <div class="card-stripe"></div>
                        <div class="card-icon-left">
                            <img src="Icon/forkspoonlogo.svg" alt="Breakfast Icon" class="fork-knife-icon">
                        </div>
                        <div class="card-icon-right">
                            ${editIconHtml}
                        </div>
                        <div class="card-image-container">
                            ${imageUrl ? `<img src="${escapeForJS(imageUrl)}" alt="${escapeForJS(item.food_name)}" class="card-food-image" onerror="this.style.display='none';">` : '<div class="card-food-image-placeholder">No Image</div>'}
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${escapeForJS(item.food_name || '-')}</h3>
                            <p class="card-description">${escapeForJS(item.description || '-')}</p>
                            <p class="card-price">₱${price}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Store current editing food ID for delete function
        let currentEditingFoodId = null;

        // Edit Food Modal Functions
        function openEditFoodModal(id, foodName, description, price, foodImage) {
            // Prevent auditors from editing food
            if (userAccessLevel === 'auditor') {
                alert('Auditors cannot edit food items. This action is restricted to Staff, Admin, and Super Admin only.');
                return;
            }

            currentEditingFoodId = id;
            document.getElementById('edit_food_id').value = id;
            document.getElementById('editFoodName').value = foodName;
            document.getElementById('editFoodDescription').value = description;
            document.getElementById('editFoodPrice').value = price;
            document.getElementById('editImagePreview').src = foodImage;
            document.getElementById('editImagePreview').style.display = 'block';
            document.getElementById('editUploadIcon').style.display = 'none';

            document.getElementById('editFoodModal').style.display = 'flex';
        }

        function closeEditFoodModal() {
            currentEditingFoodId = null;
            document.getElementById('editFoodModal').style.display = 'none';
            document.getElementById('editFoodForm').reset();
            document.getElementById('editImagePreview').style.display = 'block';
            document.getElementById('editUploadIcon').style.display = 'none';
        }

        // Delete food from modal
        async function deleteFoodFromModal() {
            if (!currentEditingFoodId) {
                alert('No food item selected!');
                return;
            }

            if (confirm('Are you sure you want to delete this food item? This action cannot be undone.')) {
                try {
                    const formData = new FormData();
                    formData.append('id', currentEditingFoodId);

                    const response = await fetch('delete_breakfast_item.php', {
                        method: 'POST',
                        body: formData
                    });

                    // Check if response is JSON
                    const contentType = response.headers.get('content-type');
                    let result;
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        console.error('Non-JSON response:', text);
                        throw new Error('Server returned non-JSON response. Please check the PHP file.');
                    } else {
                        result = await response.json();
                    }

                    if (result.success) {
                        alert(result.message);
                        closeEditFoodModal();
                        await loadBreakfast(); // Reload the breakfast list
                        filterBreakfast(); // Apply current filters
                    } else {
                        alert(result.message || 'Error deleting food item!');
                    }
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        }

        // Edit Food Form submission
        document.getElementById('editFoodForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';

        async function deleteFood(id) {
            if (!confirm('Are you sure you want to delete this food item?')) {
                return;

            try {
                const formData = new FormData();
                formData.append('id', id);

                const response = await fetch('delete_breakfast_item.php', {
                    method: 'POST',
                    body: formData

                // Check if response is JSON
                const contentType = response.headers.get('content-type');

                    const text = await response.text();
                    console.error('Non-JSON response:', text);
                    throw new Error('Server returned non-JSON response. Please check the PHP file.');
                } else {
                    result = await response.json();

                if (result.success) {
                    alert(result.message);
                    await loadBreakfast(); // Reload the breakfast list

            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Toggle Sidebar Minimize
        function toggleSidebar() {
            const leftPanel = document.querySelector('.left-panel');
            const minimizeText = document.getElementById('minimizeText');
            const minimizeIcon = document.getElementById('minimizeIcon');

            if (leftPanel.classList.contains('minimized')) {
                leftPanel.classList.remove('minimized');
                if (minimizeText) minimizeText.textContent = 'Minimize';
                if (minimizeIcon) {
                    minimizeIcon.innerHTML = '<path d="M12 5L7 10L12 15M17 5L12 10L17 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                }
            } else {
                leftPanel.classList.add('minimized');
                if (minimizeText) minimizeText.textContent = 'Expand';
                if (minimizeIcon) {
                    minimizeIcon.innerHTML = '<path d="M8 5L13 10L8 15M3 5L8 10L3 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                }
            }
        }

        // Navigation function
        function navigateToPage(page) {
            if (window.innerWidth <= 1024) {
                const panel = document.querySelector('.left-panel');
                if (panel) {
                    panel.classList.remove('open');
                }
            }
            window.location.href = page;
        }

        // Toggle sidebar on mobile (hamburger button)
        function toggleSidebar() {
            const panel = document.querySelector('.left-panel');
            if (panel) {
                panel.classList.toggle('open');
            }
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function (event) {
            if (window.innerWidth <= 1024) {
                const panel = document.querySelector('.left-panel');
                const toggleBtn = document.querySelector('.mobile-menu-toggle');
                if (panel && panel.classList.contains('open')) {
                    if (!panel.contains(event.target) && !toggleBtn.contains(event.target)) {
                        panel.classList.remove('open');
                    }
                }
            }
        });

        // Toggle Maintenance menu
        function toggleSystemMaintenance() {
            const submenu = document.getElementById('systemMaintenanceSubmenu');
            const menuItem = document.getElementById('systemMaintenanceMenu');
            const isOpen = submenu.classList.contains('open');

            if (isOpen) {
                submenu.classList.remove('open');
                menuItem.classList.remove('expanded');
            } else {
                submenu.classList.add('open');
                menuItem.classList.add('expanded');
            }
        }

        // Set active menu item based on current page
        function setActiveMenuItem() {
            const currentPage = window.location.pathname.split('/').pop() || 'Breakfast.html';
            const menuItems = document.querySelectorAll('.sidebar-menu-item:not(.collapsible-menu)');
            const submenuItems = document.querySelectorAll('.submenu-item');

            // Check if current page is in Maintenance submenu
            const isSystemMaintenancePage = ['inventory.html', 'PurchaseOrder.html', 'AddItem.php'].includes(currentPage);

            if (isSystemMaintenancePage) {
                // Expand Maintenance menu
                const submenu = document.getElementById('systemMaintenanceSubmenu');
                const menuItem = document.getElementById('systemMaintenanceMenu');
                if (submenu && menuItem) {
                    submenu.classList.add('open');
                    menuItem.classList.add('expanded');
                }

                // Set active submenu item
                submenuItems.forEach(item => {
                    const pageName = item.getAttribute('data-page');
                    if (pageName === currentPage) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            } else {
                // Set active regular menu item
                menuItems.forEach(item => {
                    const pageName = item.getAttribute('data-page');
                    if (pageName === currentPage) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        // Load breakfast on page load
        document.addEventListener('DOMContentLoaded', async function () {
            setActiveMenuItem();
            // Load user info first, then load breakfast
            await loadUserInfo();
            loadBreakfast();
        });

        // Load user profile information
        async function loadUserInfo() {
            try {
                const response = await fetch('get_user_info.php');
                const result = await response.json();

                if (result.success) {
                    const displayName = result.display_name || result.first_name || result.username || 'User';
                    const accessLevel = result.access_level || 'user';

                    // Store access level globally
                    userAccessLevel = accessLevel;

                    // Update Add Food button visibility based on access level
                    updateAddFoodButtonVisibility();

                    // Update avatar with first letter
                    const avatarEl = document.getElementById('userAvatar');
                    if (avatarEl) {
                        avatarEl.textContent = displayName.charAt(0).toUpperCase();
                    }

                    // Update username
                    const nameEl = document.getElementById('userName');
                    if (nameEl) {
                        nameEl.textContent = displayName;
                    }

                    // Update role (format: super_admin -> Super Admin)
                    const roleEl = document.getElementById('userRole');
                    if (roleEl) {
                        const formattedRole = accessLevel.split('_').map(word =>
                            word.charAt(0).toUpperCase() + word.slice(1)
                        ).join(' ');
                        roleEl.textContent = formattedRole;
                    }
                } else {
                    console.error('Failed to load user info');
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }

        // Update Add Food button visibility
        function updateAddFoodButtonVisibility() {
            const addFoodBtn = document.querySelector('.add-food-btn');
            if (addFoodBtn && userAccessLevel === 'auditor') {
                addFoodBtn.style.opacity = '0.5';
                addFoodBtn.style.cursor = 'not-allowed';
                addFoodBtn.style.pointerEvents = 'none';
                addFoodBtn.title = 'Auditors cannot add food items';
            }
        }
        function toggleSidebarMinimize() {
            const panel = document.getElementById('leftPanel');
            const icon = document.getElementById('collapseIcon');
            const tooltip = document.getElementById('collapseTooltip');
            if (!panel) return;

            if (panel.classList.contains('minimized')) {
                panel.classList.remove('minimized');
                if (icon) icon.src = 'Icon/left-arrow_minimize.svg';
                if (tooltip) tooltip.textContent = 'Minimize';
            } else {
                panel.classList.add('minimized');
                if (icon) icon.src = 'Icon/right-arrow_minimize.svg';
                if (tooltip) tooltip.textContent = 'Expand';
            }
        }

    </script>
</body>

</html>
